<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 12px; font-family: sans-serif; overflow-x: hidden; }
    #progress-container { width: 100%; height: 8px; background: #eee; margin: 10px 0; border-radius: 4px; overflow: hidden; display: none; }
    #progress-bar { width: 0%; height: 100%; background: #4caf50; transition: width 0.2s; }
    
    /* Metadata Styling */
    #metadata { font-size: 11px; color: #444; margin-bottom: 10px; line-height: 1.4; }
    .meta-label { font-weight: bold; color: #777; width: 70px; display: inline-block; }

    #found-container { 
      margin-top: 10px; padding: 8px 0; border-top: 1px solid #eee; display: flex; flex-direction: column;
    }
    .link-row { display: flex; align-items: center; gap: 8px; background: #f9f9f9; padding: 8px; border-radius: 4px; border: 1px solid #e0e0e0; }
    #vod-link-display { font-size: 11px; color: #1a73e8; text-decoration: none; word-break: break-all; cursor: pointer; flex-grow: 1; font-weight: bold; }
    #vod-link-display:hover { text-decoration: underline; }
    .copy-icon-btn { background: #4caf50; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 10px; cursor: pointer; white-space: nowrap; font-weight: bold; }
    .copy-icon-btn:hover { background: #388e3c; }

    #copy-toast { position: fixed; bottom: -40px; left: 0; right: 0; background: #2e7d32; color: white; text-align: center; padding: 8px; font-size: 12px; transition: bottom 0.3s; z-index: 100; }
    #copy-toast.show { bottom: 0; }
    button#runBtn { width: 100%; cursor: pointer; padding: 10px; font-weight: bold; background: #f0f0f0; border: 1px solid #999; }
    button#runBtn:hover { background: #e8e8e8; }
  </style>
</head>
<body>
  <h3 style="margin: 0 0 10px 0;">Twitch VOD Recover</h3>
  <button id="runBtn">Generate URLs</button>

  <div id="progress-container"><div id="progress-bar"></div></div>

  <div id="metadata"></div>

  <div id="found-container">
    <small id="status-placeholder" style="color: #999;">Ready to scan...</small>
  </div>

  <div id="copy-toast">Copied!</div>
  <script src="popup.js"></script>
</body>
</html>
