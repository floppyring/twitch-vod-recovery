<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 320px; 
      padding: 8px; /* Reduced from 12px */
      font-family: -apple-system, sans-serif; 
      background: #fff; 
      display: flex; 
      flex-direction: column; 
    }
    h3 { 
      margin: 0 0 6px 0; /* Tightened from 10px */
      font-size: 13px; 
      color: #333; 
      font-weight: 800; 
      letter-spacing: -0.5px; 
    }
    
    /* Action Area */
    .controls { margin-bottom: 6px; } /* Reduced spacing */
    button#runBtn { 
      width: 100%; cursor: pointer; padding: 8px; font-weight: bold; 
      border: 1px solid #ccc; border-radius: 4px; background: #fdfdfd; 
      font-size: 12px; transition: all 0.1s;
    }
    button#runBtn:hover { background: #f0f0f0; }
    
    #progress-container { width: 100%; height: 4px; background: #eee; margin-top: 6px; border-radius: 2px; overflow: hidden; display: none; }
    #progress-bar { width: 0%; height: 100%; background: #1a73e8; transition: width 0.2s; }

    /* Scan Tracker Text - Tightly pinned underneath the progress bar */
    #scan-status-text {
      font-size: 10.5px;
      color: #555;
      margin: 4px 0 0 0; /* Kept tight to the progress container */
      font-weight: 500;
      display: none;
    }

    /* Refined Metadata Box - Highly compressed */
    #metadata { 
      font-size: 10px; 
      color: #444; 
      background: #f0f0f0; 
      margin-top: 6px; /* Added slight gap only when it appears below controls */
      margin-bottom: 6px; 
      padding: 6px 8px; /* Tighter internal padding */
      border-radius: 4px;
      line-height: 1.4;
      border: 1px solid #e5e5e5;
      display: none; 
    }
    .meta-label { 
      font-weight: 700; 
      width: 65px; 
      display: inline-block; 
      color: #777; 
      text-transform: uppercase;
      font-size: 8.5px;
    }

    /* Framed Results Box */
    #found-container { 
      min-height: 50px;
      max-height: 220px; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 4px; /* Tighter spacing between link items */
      border: 2px dashed #e0e0e0;
      background: #fafafa;
      padding: 6px;
      border-radius: 4px;
    }
    .link-row { 
        display: flex; align-items: center; gap: 6px; background: #fff; 
        padding: 6px 8px; border-radius: 3px; border: 1px solid #eee; 
    }
    .vod-link-display-item { 
        font-size: 10.5px; color: #1a73e8; word-break: break-all; 
        cursor: pointer; flex-grow: 1; font-weight: 600; 
    }
    .copy-icon-btn { 
        background: #333; color: white; border: none; border-radius: 3px; 
        padding: 4px 6px; font-size: 9.5px; cursor: pointer; font-weight: bold;
    }
    .copy-icon-btn:hover { background: #000; }

    #copy-toast { 
        position: fixed; bottom: -40px; left: 0; right: 0; background: #2e7d32; 
        color: white; text-align: center; padding: 6px; font-size: 11px; 
        transition: bottom 0.3s; z-index: 100;
    }
    #copy-toast.show { bottom: 0; }

    /* Scrollbar */
    #found-container::-webkit-scrollbar { width: 4px; }
    #found-container::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>
  <h3>Twitch VOD Recovery</h3>

  <div class="controls">
    <button id="runBtn">START NEW SCAN</button>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="scan-status-text"></div>
  </div>

  <div id="metadata"></div>
  <div id="found-container"></div>

  <div id="copy-toast">Copied to clipboard!</div>
  <script src="popup.js"></script>
</body>
</html>
