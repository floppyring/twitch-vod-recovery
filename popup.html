<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 12px; font-family: sans-serif; }
    
    /* This container MUST exist for the bar to show up */
    #progress-container { 
      width: 100%; 
      height: 10px; 
      background: #eee; 
      margin: 10px 0; 
      border-radius: 5px; 
      overflow: hidden; 
      border: 1px solid #ccc; 
      display: none; /* Logic will switch this to 'block' */
    }

    /* This is the actual moving part */
    #progress-bar { 
      width: 0%; 
      height: 100%; 
      background: #4caf50; 
      transition: width 0.2s ease-in-out; 
    }

    #found-container { 
      height: 45px; 
      border: 2px solid #4caf50; 
      padding: 6px; 
      margin-top: 5px; 
      background: #f9fff9; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      overflow-y: auto; 
    }

    a { color: blue; text-decoration: none; font-weight: bold; font-size: 12px; word-break: break-all; }
    button { width: 100%; cursor: pointer; padding: 10px; font-weight: bold; }
    #results { font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>
  <h3 style="margin: 0 0 10px 0;">Twitch VOD Recover</h3>
  <button id="runBtn">Generate URLs</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="results"></div>

  <strong>Found VOD Link:</strong>
  <div id="found-container"></div>

  <script src="popup.js"></script>
</body>
</html>
