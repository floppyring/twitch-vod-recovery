<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 12px; font-family: -apple-system, sans-serif; background: #fff; display: flex; flex-direction: column; }
    h3 { margin: 0 0 10px 0; font-size: 14px; color: #333; font-weight: 800; letter-spacing: -0.5px; }
    
    /* Action Area */
    .controls { margin-bottom: 12px; }
    button#runBtn { 
      width: 100%; cursor: pointer; padding: 10px; font-weight: bold; 
      border: 1px solid #ccc; border-radius: 4px; background: #fdfdfd; 
      transition: all 0.1s;
    }
    button#runBtn:hover { background: #f0f0f0; }
    
    #progress-container { width: 100%; height: 4px; background: #eee; margin-top: 8px; border-radius: 2px; overflow: hidden; display: none; }
    #progress-bar { width: 0%; height: 100%; background: #1a73e8; transition: width 0.2s; }

    /* Refined Metadata - Small and Standout */
    #metadata { 
      font-size: 10.5px; 
      color: #444; 
      background: #f0f0f0; /* Concrete Grey */
      margin-bottom: 12px; 
      padding: 8px 10px; 
      border-radius: 4px;
      line-height: 1.5;
      border: 1px solid #e5e5e5;
    }
    .meta-label { 
      font-weight: 700; 
      width: 70px; 
      display: inline-block; 
      color: #777; 
      text-transform: uppercase;
      font-size: 9px;
    }

    /* Results Area */
    #found-container { 
      max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; 
    }
    .link-row { 
        display: flex; align-items: center; gap: 8px; background: #f9f9f9; 
        padding: 8px 10px; border-radius: 4px; border: 1px solid #eee; 
    }
    .vod-link-display-item { 
        font-size: 11px; color: #1a73e8; word-break: break-all; 
        cursor: pointer; flex-grow: 1; font-weight: 600; 
    }
    .copy-icon-btn { 
        background: #333; color: white; border: none; border-radius: 4px; 
        padding: 5px 8px; font-size: 10px; cursor: pointer; font-weight: bold;
    }
    .copy-icon-btn:hover { background: #000; }

    #copy-toast { 
        position: fixed; bottom: -40px; left: 0; right: 0; background: #2e7d32; 
        color: white; text-align: center; padding: 8px; font-size: 12px; 
        transition: bottom 0.3s; z-index: 100;
    }
    #copy-toast.show { bottom: 0; }

    /* Scrollbar */
    #found-container::-webkit-scrollbar { width: 5px; }
    #found-container::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
  </style>
</head>
<body>
  <h3>Twitch VOD Recovery</h3>

  <div class="controls">
    <button id="runBtn">START NEW SCAN</button>
    <div id="progress-container"><div id="progress-bar"></div></div>
  </div>

  <div id="metadata">
    </div>

  <div id="found-container">
    <small id="status-placeholder" style="color: #bbb; text-align: center; margin-top: 5px;">Ready to scan...</small>
  </div>

  <div id="copy-toast">Copied to clipboard!</div>
  <script src="popup.js"></script>
</body>
</html>
