<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 350px; padding: 10px; font-family: sans-serif; }
    #results { font-size: 12px; margin-bottom: 5px; }
    
    /* Progress Bar Styles */
    #progress-container { 
      width: 100%; height: 12px; background: #eee; 
      margin: 10px 0; display: none; border-radius: 6px; overflow: hidden;
      border: 1px solid #ccc;
    }
    #progress-bar { width: 0%; height: 100%; background: #4caf50; transition: width 0.2s; }

    /* Found URL Box */
    #found-container { 
      height: 100px; border: 2px solid #4caf50; padding: 5px; 
      margin-top: 5px; overflow-y: auto; background: #f9fff9;
    }
    
    /* General Log Box */
    #link-container { 
      height: 200px; border: 1px solid #ccc; padding: 5px; 
      margin-top: 10px; overflow-y: auto; font-size: 11px;
    }
    
    a { display: block; margin-bottom: 5px; color: blue; text-decoration: none; word-break: break-all; }
    a:hover { text-decoration: underline; }
    button { width: 100%; cursor: pointer; padding: 10px; background: #f0f0f0; border: 1px solid #999; font-weight: bold; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>Twitch VOD Recover</h3>
  <button id="runBtn">Generate URLs</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="results"></div>

  <strong>Found URLs:</strong>
  <div id="found-container"></div>

  <strong>Total Scanned Log:</strong>
  <div id="link-container"></div>

  <script src="popup.js"></script>
</body>
</html>
